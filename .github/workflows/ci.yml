name: CI

on:
  push:
  pull_request:

jobs:
  quality:
    name: Quality Gates
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.12.4
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: corepack pnpm -r typecheck

      - name: Lint
        run: corepack pnpm -r lint

      - name: Test
        run: corepack pnpm test

      - name: Build web
        run: corepack pnpm --filter @aura/web build

      - name: Upload web build artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: aura-web-build
          path: apps/web/.next
          if-no-files-found: ignore
